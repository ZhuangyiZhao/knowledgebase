<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="380" viewBox="0 0 1040 380">
  <rect width="1040" height="380" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">联合索引列顺序设计路径</text>
  <g font-family="Arial, sans-serif" font-size="16" fill="#0f172a">
    <rect x="58" y="110" width="190" height="86" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="86" y="142" font-weight="700">高频主路径</text>
    <text x="86" y="170">先服务核心 SQL</text>
    <path d="M258 153 H332" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="342" y="110" width="190" height="86" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="370" y="142" font-weight="700">等值过滤列</text>
    <text x="370" y="170">tenant_id/status</text>
    <path d="M542 153 H616" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="626" y="110" width="190" height="86" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="654" y="142" font-weight="700">范围/排序列</text>
    <text x="654" y="170">created_at/id</text>
    <path d="M826 153 H900" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="910" y="110" width="100" height="86" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="932" y="142" font-weight="700">覆盖</text>
    <text x="928" y="170">少量列</text>
    <rect x="180" y="255" width="680" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="214" y="288">目标：where、order by、limit 尽量共用同一条有序索引路径</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
