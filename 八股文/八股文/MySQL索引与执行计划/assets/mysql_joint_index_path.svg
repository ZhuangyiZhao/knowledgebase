<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360">
  <rect width="920" height="360" fill="#f7fafc"/>
  <text x="36" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">联合索引排序路径：(tenant_id, status, created_at)</text>
  <rect x="70" y="96" width="210" height="70" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="102" y="138" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">tenant_id 分组</text>
  <path d="M280 131 H360" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="360" y="96" width="210" height="70" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="410" y="138" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">status 分组</text>
  <path d="M570 131 H650" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="650" y="96" width="210" height="70" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="684" y="138" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">created_at 有序</text>
  <rect x="105" y="230" width="710" height="62" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="130" y="268" font-family="Arial, sans-serif" font-size="18" fill="#334155">只有从最左列连续使用，B+ 树才能形成稳定的定位区间。</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
