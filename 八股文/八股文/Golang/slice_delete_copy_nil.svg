<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="820" viewBox="0 0 1180 820">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .title { font-size: 28px; font-weight: 700; }
      .subtitle { font-size: 17px; fill: #475569; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 15px; fill: #475569; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 16px; }
      .cell { fill: #f8fafc; stroke: #64748b; stroke-width: 2; rx: 7; }
      .cell-hot { fill: #fff7ed; stroke: #f97316; stroke-width: 2.5; rx: 7; }
      .cell-nil { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 7; }
      .cell-hidden { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 5; rx: 7; }
      .var { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
      .slice { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
      .note { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.8; rx: 10; }
      .line { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .copy-line { stroke: #f97316; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .nil-line { stroke: #0f766e; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1180" height="820" fill="#ffffff"/>

  <text x="44" y="52" class="title">copy + nil + reslice 删除指针元素</text>
  <text x="44" y="82" class="subtitle">目标：删除下标 1 的 &amp;b，同时清掉尾部残留引用，避免对象被底层数组继续引用</text>

  <!-- Initial state -->
  <text x="44" y="130" class="label">初始状态：s = [&amp;a, &amp;b, &amp;c]</text>

  <rect x="62" y="160" width="170" height="90" class="slice"/>
  <text x="84" y="192" class="code">s</text>
  <text x="84" y="220" class="code">len=3 cap=3</text>
  <path d="M 232 205 C 270 205, 290 205, 337 205" class="line"/>

  <text x="340" y="150" class="small">底层数组</text>
  <rect x="340" y="165" width="120" height="78" class="cell"/>
  <rect x="460" y="165" width="120" height="78" class="cell-hot"/>
  <rect x="580" y="165" width="120" height="78" class="cell"/>
  <text x="385" y="192" class="small">0</text>
  <text x="505" y="192" class="small">1 要删除</text>
  <text x="625" y="192" class="small">2</text>
  <text x="376" y="224" class="code">&amp;a</text>
  <text x="496" y="224" class="code">&amp;b</text>
  <text x="616" y="224" class="code">&amp;c</text>

  <rect x="850" y="130" width="86" height="54" class="var"/>
  <rect x="850" y="215" width="86" height="54" class="var"/>
  <rect x="850" y="300" width="86" height="54" class="var"/>
  <text x="878" y="164" class="code">a=1</text>
  <text x="878" y="249" class="code">b=2</text>
  <text x="878" y="334" class="code">c=3</text>
  <path d="M 400 243 C 505 285, 680 130, 848 156" class="line"/>
  <path d="M 520 243 C 620 300, 720 220, 848 241" class="line"/>
  <path d="M 640 243 C 720 290, 770 315, 848 326" class="line"/>

  <!-- Step 1 copy -->
  <text x="44" y="346" class="label">1. copy(s[1:], s[2:])</text>
  <text x="44" y="374" class="subtitle">把 s[2:] 的内容复制到 s[1:]：也就是把 &amp;c 前移覆盖 &amp;b</text>

  <rect x="340" y="405" width="120" height="78" class="cell"/>
  <rect x="460" y="405" width="120" height="78" class="cell-hot"/>
  <rect x="580" y="405" width="120" height="78" class="cell"/>
  <text x="385" y="432" class="small">0</text>
  <text x="505" y="432" class="small">1</text>
  <text x="625" y="432" class="small">2</text>
  <text x="376" y="464" class="code">&amp;a</text>
  <text x="496" y="464" class="code">&amp;c</text>
  <text x="616" y="464" class="code">&amp;c</text>

  <path d="M 640 405 C 640 355, 520 355, 520 403" class="copy-line"/>
  <text x="742" y="438" class="code" fill="#ea580c">copy 之后: [&amp;a, &amp;c, &amp;c]</text>
  <text x="742" y="466" class="small">现在 len 还没变，仍然是 3</text>

  <!-- Step 2 nil -->
  <text x="44" y="548" class="label">2. s[len(s)-1] = nil</text>
  <text x="44" y="576" class="subtitle">len(s)-1 是最后一个可见下标 2，把尾部残留的 &amp;c 清成 nil</text>

  <rect x="340" y="607" width="120" height="78" class="cell"/>
  <rect x="460" y="607" width="120" height="78" class="cell"/>
  <rect x="580" y="607" width="120" height="78" class="cell-nil"/>
  <text x="385" y="634" class="small">0</text>
  <text x="505" y="634" class="small">1</text>
  <text x="625" y="634" class="small">2</text>
  <text x="376" y="666" class="code">&amp;a</text>
  <text x="496" y="666" class="code">&amp;c</text>
  <text x="618" y="666" class="code">nil</text>

  <path d="M 735 646 C 710 646, 708 646, 704 646" class="nil-line"/>
  <text x="742" y="642" class="code" fill="#0f766e">清掉尾部引用</text>
  <text x="742" y="670" class="small">这一步是为了 GC 能回收不再需要的对象</text>

  <!-- Step 3 reslice -->
  <text x="44" y="742" class="label">3. s = s[:len(s)-1]</text>
  <text x="340" y="742" class="subtitle">把长度从 3 缩成 2；最终 s 只看到 [&amp;a, &amp;c]，cap 仍然是 3</text>

  <rect x="340" y="765" width="120" height="38" class="cell"/>
  <rect x="460" y="765" width="120" height="38" class="cell"/>
  <rect x="580" y="765" width="120" height="38" class="cell-hidden"/>
  <text x="376" y="790" class="code">&amp;a</text>
  <text x="496" y="790" class="code">&amp;c</text>
  <text x="618" y="790" class="code">nil</text>

  <rect x="62" y="748" width="170" height="58" class="slice"/>
  <text x="84" y="782" class="code">s: len=2 cap=3</text>
  <path d="M 232 779 C 270 779, 290 779, 337 779" class="line"/>
</svg>
