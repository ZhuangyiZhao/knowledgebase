<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="380" viewBox="0 0 1040 380">
  <rect width="1040" height="380" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">判断 SQL 是否用好索引的排查链路</text>
  <g font-family="Arial, sans-serif" font-size="16" fill="#0f172a">
    <rect x="55" y="110" width="155" height="76" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="87" y="142" font-weight="700">SQL 形态</text>
    <text x="82" y="168">where/order</text>
    <path d="M220 148 H285" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="295" y="110" width="155" height="76" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="346" y="142" font-weight="700">EXPLAIN</text>
    <text x="323" y="168">type/key/rows</text>
    <path d="M460 148 H525" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="535" y="110" width="155" height="76" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="565" y="142" font-weight="700">额外操作</text>
    <text x="560" y="168">排序/临时表</text>
    <path d="M700 148 H765" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="775" y="110" width="210" height="76" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="835" y="142" font-weight="700">线上指标</text>
    <text x="815" y="168">耗时/扫描/I/O/P99</text>
    <rect x="176" y="260" width="688" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="220" y="293">不要只看 key 命中，要看扫描量和额外成本是否真的下降</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
