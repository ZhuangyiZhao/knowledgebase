<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390">
  <rect width="920" height="390" fill="#f8fafc"/>
  <text x="36" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">SQL 优化案例叙述骨架</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#1f2937">
    <rect x="65" y="105" width="140" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="99" y="147">背景</text>
    <path d="M205 140 H260" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="260" y="105" width="140" height="70" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="294" y="147">问题</text>
    <path d="M400 140 H455" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="455" y="105" width="140" height="70" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="489" y="147">方案</text>
    <path d="M595 140 H650" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="650" y="105" width="140" height="70" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="684" y="147">结果</text>
    <rect x="210" y="250" width="500" height="62" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="245" y="288">一定带指标：P95、扫描行数、QPS、CPU、慢日志数量。</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
