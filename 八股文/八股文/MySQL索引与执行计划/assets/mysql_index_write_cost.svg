<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="390" viewBox="0 0 1040 390">
  <rect width="1040" height="390" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">索引越多，写入时要维护的结构越多</text>
  <g font-family="Arial, sans-serif" font-size="16" fill="#0f172a">
    <rect x="70" y="150" width="170" height="82" rx="10" fill="#dbeafe" stroke="#2563eb"/>
    <text x="103" y="184" font-weight="700">一次写入</text>
    <text x="94" y="210">insert/update</text>
    <path d="M250 191 H345" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="355" y="85" width="190" height="62" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="392" y="123">聚簇索引页</text>
    <rect x="355" y="164" width="190" height="62" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="395" y="202">二级索引 A</text>
    <rect x="355" y="243" width="190" height="62" rx="8" fill="#fee2e2" stroke="#dc2626"/>
    <text x="395" y="281">二级索引 B</text>
    <path d="M555 116 H690" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M555 195 H690" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M555 274 H690" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="700" y="120" width="270" height="150" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="735" y="156" font-weight="700">额外成本</text>
    <text x="735" y="188">更多页修改</text>
    <text x="735" y="218">更多 redo log 和脏页</text>
    <text x="735" y="248">更高缓存压力</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
