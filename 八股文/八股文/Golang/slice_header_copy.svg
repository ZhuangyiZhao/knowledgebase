<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 18px Arial, sans-serif; fill: #374151; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
      .code { font: 16px Menlo, Consolas, monospace; fill: #111827; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 8; }
      .header { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .header2 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .array { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
      .cell { fill: #ffedd5; stroke: #ea580c; stroke-width: 2; }
      .cellHidden { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
      .note { fill: #f9fafb; stroke: #6b7280; stroke-width: 1.5; rx: 8; }
      .blue { fill: #2563eb; }
      .red { fill: #dc2626; }
      .green { fill: #16a34a; }
      .muted { fill: #6b7280; }
    </style>
  </defs>

  <rect width="1180" height="760" fill="#f8fafc"/>

  <text x="40" y="48" class="title">slice 传参：复制的是 slice header，不复制底层数组</text>
  <text x="40" y="82" class="subtitle">slice header 可以粗略理解为：ptr + len + cap</text>

  <rect x="40" y="110" width="1100" height="275" class="box"/>
  <text x="64" y="145" class="label">1. 调用函数时：a 的 header 被复制一份给参数 s</text>
  <text x="64" y="176" class="code">func change(s []int) { s[0] = 99 }</text>
  <text x="64" y="202" class="code">a := []int{1, 2, 3}; change(a)</text>

  <rect x="85" y="230" width="250" height="105" class="header"/>
  <text x="105" y="258" class="label">main 里的 a header</text>
  <text x="108" y="288" class="code">ptr ───────┐</text>
  <text x="108" y="313" class="code">len = 3</text>
  <text x="198" y="313" class="code">cap = 3</text>

  <rect x="455" y="230" width="250" height="105" class="header2"/>
  <text x="475" y="258" class="label">函数里的 s header</text>
  <text x="478" y="288" class="code">ptr ───────┐</text>
  <text x="478" y="313" class="code">len = 3</text>
  <text x="568" y="313" class="code">cap = 3</text>

  <text x="355" y="275" class="small muted">复制 header</text>
  <path d="M335 280 C370 260, 415 260, 455 280" fill="none" stroke="#6b7280" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-blue)"/>

  <rect x="805" y="232" width="260" height="72" class="array"/>
  <text x="825" y="222" class="label">同一个底层数组</text>
  <rect x="825" y="250" width="60" height="36" class="cell"/>
  <rect x="885" y="250" width="60" height="36" class="cell"/>
  <rect x="945" y="250" width="60" height="36" class="cell"/>
  <text x="850" y="274" class="code">1</text>
  <text x="910" y="274" class="code">2</text>
  <text x="970" y="274" class="code">3</text>

  <path d="M230 286 C360 355, 680 355, 830 286" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <path d="M600 286 C690 335, 770 335, 850 286" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <rect x="85" y="345" width="980" height="28" fill="none"/>
  <text x="90" y="365" class="small">重点：a header 和 s header 是两份，但它们的 ptr 都指向同一个底层数组。所以 s[0] = 99 改元素，外面的 a 能看到。</text>

  <rect x="40" y="415" width="1100" height="300" class="box"/>
  <text x="64" y="450" class="label">2. 函数里 append：改的是函数内部 s header 的 len，外层 a header 不会自动变</text>
  <text x="64" y="481" class="code">func add(s []int) { s = append(s, 4) }</text>
  <text x="64" y="507" class="code">a := make([]int, 3, 4); add(a)</text>

  <rect x="85" y="545" width="270" height="115" class="header"/>
  <text x="105" y="573" class="label">main 里的 a header</text>
  <text x="108" y="603" class="code">ptr ───────┐</text>
  <text x="108" y="628" class="code">len = 3</text>
  <text x="198" y="628" class="code">cap = 4</text>
  <text x="108" y="651" class="small red">外层 len 没变，只能看到 3 个元素</text>

  <rect x="455" y="545" width="270" height="115" class="header2"/>
  <text x="475" y="573" class="label">add 里的 s header</text>
  <text x="478" y="603" class="code">ptr ───────┐</text>
  <text x="478" y="628" class="code">len = 4</text>
  <text x="568" y="628" class="code">cap = 4</text>
  <text x="478" y="651" class="small green">内部 len 变成 4，能看到新元素</text>

  <rect x="805" y="555" width="300" height="78" class="array"/>
  <text x="825" y="545" class="label">底层数组仍可能被写入 4</text>
  <rect x="825" y="575" width="60" height="36" class="cell"/>
  <rect x="885" y="575" width="60" height="36" class="cell"/>
  <rect x="945" y="575" width="60" height="36" class="cell"/>
  <rect x="1005" y="575" width="60" height="36" class="cellHidden"/>
  <text x="850" y="599" class="code">1</text>
  <text x="910" y="599" class="code">2</text>
  <text x="970" y="599" class="code">3</text>
  <text x="1030" y="599" class="code">4</text>

  <path d="M230 602 C365 700, 690 700, 830 610" fill="none" stroke="#dc2626" stroke-width="3" marker-end="url(#arrow-red)"/>
  <path d="M600 602 C700 675, 805 665, 1025 612" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <rect x="70" y="690" width="1040" height="48" class="note"/>
  <text x="90" y="720" class="label">口诀：改元素 = 改底层数组，外面看得到；append = 改 slice header，外面不一定看得到。想让外层看到 append 后的新 len，要 return 新 slice。</text>
</svg>
