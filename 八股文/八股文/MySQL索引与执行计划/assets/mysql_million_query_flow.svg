<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390">
  <rect width="920" height="390" fill="#f8fafc"/>
  <text x="36" y="46" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">百万级表查询优化路径</text>
  <g font-family="Arial, sans-serif" font-size="16" fill="#1f2937">
    <rect x="70" y="95" width="145" height="62" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="97" y="132">确认 SQL</text>
    <path d="M215 126 H275" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="275" y="95" width="145" height="62" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="302" y="132">看执行计划</text>
    <path d="M420 126 H480" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="480" y="95" width="145" height="62" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="506" y="132">补索引/改写</text>
    <path d="M625 126 H685" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="685" y="95" width="145" height="62" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="712" y="132">压测和上线</text>
    <rect x="190" y="245" width="540" height="66" rx="8" fill="#fff" stroke="#94a3b8"/>
    <text x="230" y="285">目标：减少扫描行数、随机 I/O、回表次数和锁竞争。</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
