<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="390" viewBox="0 0 1040 390">
  <rect width="1040" height="390" fill="#f8fafc"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">联合索引不是多个单列索引相加</text>
  <text x="40" y="76" font-family="Arial, sans-serif" font-size="16" fill="#475569">比较顺序：tenant_id -> status -> created_at</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#0f172a">
    <rect x="70" y="120" width="260" height="180" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="104" y="152" font-weight="700">tenant_id = 10</text>
    <rect x="105" y="176" width="190" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="128" y="199">status = 0</text>
    <rect x="105" y="222" width="190" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="128" y="245">status = 1</text>
    <rect x="105" y="268" width="190" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="128" y="291">status = 2</text>
    <rect x="390" y="120" width="260" height="180" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="424" y="152" font-weight="700">tenant_id = 11</text>
    <rect x="425" y="176" width="190" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="448" y="199">status = 0</text>
    <rect x="425" y="222" width="190" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="448" y="245">status = 1</text>
    <rect x="425" y="268" width="190" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="448" y="291">status = 2</text>
    <rect x="710" y="120" width="260" height="180" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="744" y="152" font-weight="700">每个 status 内</text>
    <rect x="744" y="178" width="190" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="762" y="201">created_at: 09:00</text>
    <rect x="744" y="224" width="190" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="762" y="247">created_at: 10:00</text>
    <rect x="744" y="270" width="190" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="762" y="293">created_at: 11:00</text>
  </g>
  <path d="M330 210 H390" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M650 210 H710" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="212" y="348" font-family="Arial, sans-serif" font-size="16" fill="#334155">只有前面的列先确定，后面的列才在局部范围内有序。</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
